<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aftelklok</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 24px; }
    .wrap { max-width: 520px; margin: 0 auto; text-align: center; }
    .timer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 18px; }
    .box { padding: 14px 10px; border: 1px solid #ddd; border-radius: 12px; background: #fafafa; }
    .num { font-size: 2.1rem; font-weight: 700; line-height: 1; }
    .lbl { margin-top: 6px; font-size: .9rem; color: #666; }
    .done { margin-top: 16px; font-weight: 600; color: #0a7; display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Volgende speeldag</h1>
    <p>Aftellen naar: <strong id="targetText"></strong></p>

    <div class="timer" aria-live="polite">
      <div class="box"><div class="num" id="days">00</div><div class="lbl">Dagen</div></div>
      <div class="box"><div class="num" id="hours">00</div><div class="lbl">Uren</div></div>
      <div class="box"><div class="num" id="mins">00</div><div class="lbl">Minuten</div></div>
      <div class="box"><div class="num" id="secs">00</div><div class="lbl">Seconden</div></div>
    </div>

    <div class="done" id="doneMsg">✅ Tijd is om!</div>
  </div>

  <script>
    // Zet hier je doelmoment (lokale tijd van de computer)
    // Voorbeeld: 31 december 2026 om 23:59:59
    const target = new Date(2026, 2, 23, 14, 0, 0); // (jaar, maand-1, dag, uur, min, sec)

    const el = (id) => document.getElementById(id);
    el("targetText").textContent = target.toLocaleString("nl-BE");

    const pad2 = (n) => String(n).padStart(2, "0");

    function tick() {
      const now = new Date();
      let diff = target - now; // milliseconden

      if (diff <= 0) {
        el("days").textContent = "00";
        el("hours").textContent = "00";
        el("mins").textContent = "00";
        el("secs").textContent = "00";
        el("doneMsg").style.display = "block";
        clearInterval(timer);
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const mins = Math.floor((totalSeconds % 3600) / 60);
      const secs = totalSeconds % 60;

      el("days").textContent = String(days);
      el("hours").textContent = pad2(hours);
      el("mins").textContent = pad2(mins);
      el("secs").textContent = pad2(secs);
    }

    tick(); // meteen tonen
    const timer = setInterval(tick, 1000);
  </script>
</body>
</html>
